<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E879F9"/>
      <stop offset="50%"  stop-color="#C026D3"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <!-- Upper Y arms -->
  <line x1="50" y1="30" x2="12" y2="6"  stroke="url(#g)" stroke-width="13" stroke-linecap="round"/>
  <line x1="50" y1="30" x2="88" y2="6"  stroke="url(#g)" stroke-width="13" stroke-linecap="round"/>

  <!-- Long center stem -->
  <line x1="50" y1="30" x2="50" y2="70" stroke="url(#g)" stroke-width="13" stroke-linecap="round"/>

  <!-- Lower inverted Y arms -->
  <line x1="50" y1="70" x2="12" y2="94" stroke="url(#g)" stroke-width="13" stroke-linecap="round"/>
  <line x1="50" y1="70" x2="88" y2="94" stroke="url(#g)" stroke-width="13" stroke-linecap="round"/>

  <!-- Junction dots to break the X illusion -->
  <circle cx="50" cy="30" r="9" fill="#FAF5FF"/>
  <circle cx="50" cy="70" r="9" fill="#FAF5FF"/>
</svg>
