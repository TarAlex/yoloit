<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 200" width="540" height="200">
  <defs>
    <linearGradient id="g" x1="100" y1="0" x2="100" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C026D3"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (200×200) -->
  <rect width="200" height="200" rx="44" fill="white"/>

  <!-- Finger 1: index (behind) bottom-left → top-right -->
  <line x1="85"  y1="182" x2="140" y2="18"
        stroke="url(#g)" stroke-width="28" stroke-linecap="round"/>

  <!-- White knockout at crossing point -->
  <line x1="105" y1="150" x2="95"  y2="122"
        stroke="white" stroke-width="40" stroke-linecap="round"/>

  <!-- Finger 2: middle (in front) bottom-right → top-left -->
  <line x1="115" y1="182" x2="60"  y2="18"
        stroke="url(#g)" stroke-width="28" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="224" y="118"
        font-family="'SF Pro Rounded','Nunito','Poppins','Helvetica Neue',Arial,sans-serif"
        font-size="72" font-weight="700" letter-spacing="-2"
        fill="url(#tg)">yoloit</text>

  <text x="226" y="150"
        font-family="'SF Pro Text','Nunito','Helvetica Neue',Arial,sans-serif"
        font-size="18" font-weight="600" letter-spacing="5"
        fill="#4C1D95">AI ORCHESTRATOR</text>
</svg>
