<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 210" width="540" height="210">
  <defs>
    <linearGradient id="g" x1="100" y1="15" x2="100" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C026D3"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- ── ICON MARK (200×210) ── -->
  <rect width="200" height="210" rx="44" fill="white" filter="url(#shadow)"/>

  <!-- Right arm (behind) -->
  <path d="M 100 118 C 110 104,126 88,138 74 C 150 60,160 46,158 34
           C 156 22,142 18,132 26 C 122 34,124 50,136 64"
        fill="none" stroke="url(#g)" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- White knockout at crossing -->
  <path d="M 100 118 C 97 110,94 102,92 96"
        fill="none" stroke="white" stroke-width="20" stroke-linecap="round"/>

  <!-- Left arm + stem (in front) -->
  <path d="M 78 72 C 90 56,92 40,82 30 C 72 20,58 24,56 36
           C 54 48,64 60,76 72 C 88 86,96 104,100 118 L 100 180"
        fill="none" stroke="url(#g)" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Leaf -->
  <path d="M 100 177 C 89 185,85 198,100 206 C 115 198,111 185,100 177 Z"
        fill="url(#g)"/>

  <!-- ── WORDMARK ── -->
  <text x="224" y="118"
        font-family="'SF Pro Rounded','Nunito','Poppins','Helvetica Neue',Arial,sans-serif"
        font-size="72" font-weight="700" letter-spacing="-2"
        fill="url(#tg)">yoloit</text>

  <text x="226" y="150"
        font-family="'SF Pro Text','Nunito','Helvetica Neue',Arial,sans-serif"
        font-size="18" font-weight="600" letter-spacing="5"
        fill="#4C1D95">AI ORCHESTRATOR</text>
</svg>
