<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="1024" height="1024">
  <defs>
    <linearGradient id="g" x1="100" y1="10" x2="100" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <!-- White rounded background (for app icon) -->
  <rect width="200" height="200" rx="44" ry="44" fill="white"/>

  <!-- Y mark: two arms with loops + stem + leaf -->
  <g stroke="url(#g)" stroke-linecap="round" stroke-linejoin="round"
     fill="none" stroke-width="14">

    <!-- Left arm: junction → up-left → loop -->
    <path d="
      M 100 112
      C  84  96,  65  76,  52  58
      C  40  40,  40  20,  53  14
      C  66   8,  80  18,  80  34
      C  80  48,  70  58,  66  64
    "/>

    <!-- Right arm: junction → up-right → loop (mirror) -->
    <path d="
      M 100 112
      C 116  96, 135  76, 148  58
      C 160  40, 160  20, 147  14
      C 134   8, 120  18, 120  34
      C 120  48, 130  58, 134  64
    "/>

    <!-- Stem -->
    <line x1="100" y1="112" x2="100" y2="168"/>
  </g>

  <!-- Leaf at bottom of stem -->
  <path d="M 100 165
           C  88 173,  84 186, 100 194
           C 116 186, 112 173, 100 165 Z"
        fill="url(#g)"/>
</svg>
