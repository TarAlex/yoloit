<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" width="1024" height="1024">
  <defs>
    <linearGradient id="g" x1="100" y1="15" x2="100" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Card background with shadow -->
  <rect width="200" height="210" rx="44" fill="white" filter="url(#shadow)"/>

  <!--
    Y-mark = two arms that CROSS (crossed-fingers 🤞 style):

    RIGHT ARM (behind) — from center up-right to closed-loop pill
    Draw first so left arm renders on top at the crossing.
  -->
  <path d="
    M 100 118
    C 110 104, 126 88, 138 74
    C 150 60, 160 46, 158 34
    C 156 22, 142 18, 132 26
    C 122 34, 124 50, 136 64
  " fill="none" stroke="url(#g)"
     stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <!--
    WHITE KNOCKOUT — cuts a gap in the right arm where the left arm
    crosses over, making the interlace (one arm in front) visible.
  -->
  <path d="M 100 118 C 97 110, 94 102, 92 96"
    fill="none" stroke="white" stroke-width="20" stroke-linecap="round"/>

  <!--
    LEFT ARM + STEM (in front) — closed loop at upper-left,
    arm curves down-right through the crossing zone, then straight
    down as the Y stem to the leaf.

    The loop closes visually: path starts at (78,72) and returns to
    (76,72) — the round cap overlaps the stroke body, sealing the pill.
  -->
  <path d="
    M 78 72
    C 90 56, 92 40, 82 30
    C 72 20, 58 24, 56 36
    C 54 48, 64 60, 76 72
    C 88 86, 96 104, 100 118
    L 100 180
  " fill="none" stroke="url(#g)"
     stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Leaf at the bottom of the stem -->
  <path d="M 100 177
           C  89 185,  85 198, 100 206
           C 115 198, 111 185, 100 177 Z"
        fill="url(#g)"/>
</svg>
