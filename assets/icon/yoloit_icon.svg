<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="1024" height="1024">
  <defs>
    <linearGradient id="g" x1="100" y1="0" x2="100" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F0ABFC"/>
      <stop offset="45%"  stop-color="#C026D3"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="#FAF5FF"/>

  <!-- Upper Y: junction at (100, 72) -->
  <line x1="100" y1="72" x2="38" y2="22"  stroke="url(#g)" stroke-width="26" stroke-linecap="round"/>
  <line x1="100" y1="72" x2="162" y2="22" stroke="url(#g)" stroke-width="26" stroke-linecap="round"/>

  <!-- Shared vertical stem: top junction → bottom junction -->
  <line x1="100" y1="72" x2="100" y2="130" stroke="url(#g)" stroke-width="26" stroke-linecap="round"/>

  <!-- Lower inverted Y: junction at (100, 130) -->
  <line x1="100" y1="130" x2="38" y2="178"  stroke="url(#g)" stroke-width="26" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="162" y2="178" stroke="url(#g)" stroke-width="26" stroke-linecap="round"/>

  <!-- Chain links above upper Y (background color cutouts at arm tips) -->
  <ellipse cx="41"  cy="24" rx="9" ry="5" transform="rotate(-55 41 24)"  fill="#FAF5FF"/>
  <ellipse cx="41"  cy="24" rx="9" ry="5" transform="rotate(-55 41 24)"  fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
  <ellipse cx="159" cy="24" rx="9" ry="5" transform="rotate(55 159 24)"  fill="#FAF5FF"/>
  <ellipse cx="159" cy="24" rx="9" ry="5" transform="rotate(55 159 24)"  fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
  <!-- Center top link -->
  <ellipse cx="100" cy="12" rx="11" ry="5" fill="#FAF5FF"/>
  <ellipse cx="100" cy="12" rx="11" ry="5" fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
</svg>
