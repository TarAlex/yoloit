<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="1024" height="1024">
  <defs>
    <linearGradient id="g" x1="100" y1="0" x2="100" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>

  <!-- App icon background -->
  <rect width="200" height="200" rx="44" fill="white"/>

  <!--
    Crossed fingers 🤞
    Two fingers — each a thick rounded stroke.
    They start close at the bottom and cross in the lower-middle area.
    The right finger (index) is BEHIND; the left finger (middle) is IN FRONT.

    Crossing point ≈ (100, 136)
  -->

  <!-- Finger 1 — index finger (behind): bottom-left → top-right -->
  <line x1="85"  y1="182" x2="140" y2="18"
        stroke="url(#g)" stroke-width="28" stroke-linecap="round"/>

  <!-- White knockout: erases finger 1 where finger 2 passes in front -->
  <line x1="105" y1="150" x2="95"  y2="122"
        stroke="white" stroke-width="40" stroke-linecap="round"/>

  <!-- Finger 2 — middle finger (in front): bottom-right → top-left -->
  <line x1="115" y1="182" x2="60"  y2="18"
        stroke="url(#g)" stroke-width="28" stroke-linecap="round"/>
</svg>
