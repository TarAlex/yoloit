name: Release All Platforms

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.0.17) or "auto" to increment patch'
        required: false
        default: 'auto'

jobs:
  release:
    name: Create Release & Trigger All Builds
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # needed to trigger other workflows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version tag
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT="${{ inputs.version }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "auto" ]; then
            LATEST=$(gh release list --repo "${{ github.repository }}" --limit 10 --json tagName \
              --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | first | .tagName' 2>/dev/null || echo "")
            if [ -z "$LATEST" ]; then
              TAG="v0.0.1"
              echo "No previous release — starting at $TAG"
            else
              MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\1/')
              MINOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\2/')
              PATCH=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\3/')
              PATCH=$((PATCH + 1))
              TAG="v${MAJOR}.${MINOR}.${PATCH}"
              echo "Previous: $LATEST => auto-increment to $TAG"
            fi
          else
            TAG="$INPUT"
            [[ "$TAG" != v* ]] && TAG="v$TAG"
            echo "Using manual version: $TAG"
          fi
          VERSION_CLEAN="${TAG#v}"
          echo "version=$VERSION_CLEAN" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create unified GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release $RELEASE_TAG already exists — builds will upload assets to it."
          else
            NOTES="## YoLoIT $RELEASE_TAG\n\n## Installation\n\n| Platform | File | How to install |\n|----------|------|----------------|\n| **macOS** | \`.dmg\` | Open and drag YoLoIT.app to Applications |\n| **Windows** | \`.zip\` | Extract and run \`yoloit.exe\` |\n| **Linux** | \`.tar.gz\` | Extract and run \`bundle/yoloit\` |"
            printf '%b\n' "$NOTES" > release-notes.md
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "YoLoIT $RELEASE_TAG" \
              --notes-file release-notes.md \
              --latest
            echo "Release $RELEASE_TAG created."
          fi

      - name: Trigger macOS build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh workflow run build-macos.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            --field version="$RELEASE_TAG" \
            --field create_release=true
          echo "macOS build triggered."

      - name: Trigger Windows build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh workflow run build-windows.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            --field version="$RELEASE_TAG" \
            --field create_release=true
          echo "Windows build triggered."

      - name: Trigger Linux build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh workflow run build-linux.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            --field version="$RELEASE_TAG" \
            --field create_release=true
          echo "Linux build triggered."

      - name: Summary
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          echo "## Release $RELEASE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All 3 platform builds have been triggered in parallel." >> $GITHUB_STEP_SUMMARY
          echo "They will upload assets to the unified release as they complete." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View release: https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" >> $GITHUB_STEP_SUMMARY

