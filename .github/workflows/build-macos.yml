name: Build macOS Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.0.2) or "auto" to increment patch'
        required: false
        default: 'auto'
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-macos:
    name: Build macOS App
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository (fast local mirror)
        run: |
          LOCAL_REPO="$HOME/git/yoloit/yoloit"
          if [ -d "$LOCAL_REPO/.git" ]; then
            echo "Using fast local mirror rsync..."
            rsync -a --delete \
              --exclude='.git' \
              --exclude='build/' \
              --exclude='.dart_tool/' \
              "$LOCAL_REPO/" "$GITHUB_WORKSPACE/"
            if [ ! -d "$GITHUB_WORKSPACE/.git" ]; then
              git -C "$GITHUB_WORKSPACE" init
              git -C "$GITHUB_WORKSPACE" remote add origin https://github.com/IstiN/yoloit.git
            fi
            git -C "$GITHUB_WORKSPACE" fetch "$LOCAL_REPO" HEAD --depth=1
            git -C "$GITHUB_WORKSPACE" checkout -f FETCH_HEAD
          else
            echo "No local mirror found, falling back to GitHub checkout..."
            git clone --depth=1 https://github.com/IstiN/yoloit.git "$GITHUB_WORKSPACE" || true
          fi
          echo "Checked out: $(git -C $GITHUB_WORKSPACE log -1 --oneline)"

      # ── Environment ─────────────────────────────────────────────────────────
      - name: Setup Flutter environment
        run: |
          echo "$HOME/.local/flutter/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          flutter --version

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Version ─────────────────────────────────────────────────────────────
      - name: Derive build version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "auto" ]; then
            # Find latest release tag and increment patch version
            LATEST=$(gh release list --limit 10 --json tagName \
              --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | first | .tagName' 2>/dev/null || echo "")
            if [ -z "$LATEST" ]; then
              TAG="v0.0.1"
              echo "No previous release found — starting at $TAG"
            else
              # Parse vMAJOR.MINOR.PATCH and increment PATCH
              MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\1/')
              MINOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\2/')
              PATCH=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\3/')
              PATCH=$((PATCH + 1))
              TAG="v${MAJOR}.${MINOR}.${PATCH}"
              echo "Previous release: $LATEST → auto-increment to $TAG"
            fi
          else
            TAG="$INPUT"
            # Ensure it starts with 'v'
            [[ "$TAG" != v* ]] && TAG="v$TAG"
            echo "Using manual version: $TAG"
          fi
          VERSION_CLEAN="${TAG#v}"
          echo "version=$VERSION_CLEAN" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # ── Code signing (optional) ──────────────────────────────────────────────
      # These secrets are optional. If not set, app is built unsigned (development only).
      # Required secrets for signing:
      #   MACOS_CERTIFICATE_P12_BASE64  — base64-encoded Developer ID Application .p12
      #   MACOS_CERTIFICATE_PASSWORD    — password for the .p12
      #   MACOS_CERTIFICATE_ID          — certificate name, e.g. "Developer ID Application: Name (TEAMID)"
      #   MACOS_KEYCHAIN_PASSWORD       — temp keychain password (any random string)
      #   MACOS_PROVISION_PROFILE_BASE64 — base64-encoded .provisionprofile (if using hardened runtime)
      #   MACOS_NOTARIZE_APPLE_ID       — Apple ID for notarization
      #   MACOS_NOTARIZE_TEAM_ID        — Apple Team ID
      #   MACOS_NOTARIZE_APP_PASSWORD   — App-specific password for notarization
      - name: Import macOS signing certificate
        id: signing
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_CERTIFICATE_ID: ${{ secrets.MACOS_CERTIFICATE_ID }}
        run: |
          if [ -z "$MACOS_CERTIFICATE_P12_BASE64" ]; then
            echo "⚠️  No signing certificate found — building unsigned (development only)"
            echo "signed=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Signing certificate found — importing..."
            security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            security list-keychains -d user -s build.keychain ~/Library/Keychains/login.keychain-db

            echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
            security import certificate.p12 -k build.keychain \
              -P "$MACOS_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/productbuild
            security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain
            echo "signed=true" >> $GITHUB_OUTPUT
          fi

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build macOS release (universal)
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          # Build universal binary (arm64 + x86_64) via Xcode ARCHS override
          FLUTTER_XCODE_ARCHS="arm64 x86_64" flutter build macos --release \
            --build-number=$BUILD_NUMBER
          # Verify architectures in the produced binary
          MAIN_BIN=$(find build/macos/Build/Products/Release/yoloit.app -name "yoloit" -type f | head -1)
          echo "Architectures in binary:"
          lipo -info "$MAIN_BIN" || file "$MAIN_BIN"

      # ── Package as DMG ───────────────────────────────────────────────────────
      - name: Package as DMG
        id: package
        env:
          SIGNED: ${{ steps.signing.outputs.signed }}
          MACOS_CERTIFICATE_ID: ${{ secrets.MACOS_CERTIFICATE_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP_PATH="build/macos/Build/Products/Release/yoloit.app"

          # Detect whether we have a universal binary
          MAIN_BIN=$(find "$APP_PATH" -name "yoloit" -type f | head -1)
          if lipo -info "$MAIN_BIN" 2>/dev/null | grep -q "arm64.*x86_64\|x86_64.*arm64"; then
            ARCH_LABEL="universal"
          else
            ARCH_LABEL=$(lipo -info "$MAIN_BIN" 2>/dev/null | awk -F': ' '{print $NF}' | tr -d ' ' || uname -m)
          fi

          DMG_NAME="yoloit-macos-${ARCH_LABEL}-${VERSION}.dmg"

          # Clean up any leftover files from previous runs
          rm -f yoloit-macos-*.dmg tmp-yoloit.dmg
          rm -rf dmg-staging

          echo "Packaging: $APP_PATH → $DMG_NAME (arch: $ARCH_LABEL)"

          if [ "$SIGNED" = "true" ] && [ -n "$MACOS_CERTIFICATE_ID" ]; then
            echo "Signing .app bundle..."
            codesign --force --deep --sign "$MACOS_CERTIFICATE_ID" \
              --options runtime \
              --entitlements macos/Runner/Release.entitlements \
              "$APP_PATH"
          fi

          # Create a staging folder with app + Applications symlink (drag-to-install DMG)
          DMG_STAGING="dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          # Create a writable DMG first, then convert to compressed read-only
          TMP_DMG="tmp-yoloit.dmg"
          hdiutil create \
            -volname "yoloit $VERSION" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDRW \
            "$TMP_DMG"

          # Convert to compressed final DMG
          hdiutil convert "$TMP_DMG" -format UDZO -o "$DMG_NAME"
          rm -f "$TMP_DMG"
          rm -rf "$DMG_STAGING"

          echo "arch_label=$ARCH_LABEL" >> $GITHUB_OUTPUT
          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT

      # ── Notarize (optional) ──────────────────────────────────────────────────
      - name: Notarize DMG
        if: steps.signing.outputs.signed == 'true'
        env:
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
          MACOS_NOTARIZE_APP_PASSWORD: ${{ secrets.MACOS_NOTARIZE_APP_PASSWORD }}
          DMG_NAME: ${{ steps.package.outputs.dmg_name }}
        run: |
          if [ -z "$MACOS_NOTARIZE_APPLE_ID" ]; then
            echo "⚠️  Notarization secrets not set — skipping notarization"
            exit 0
          fi
          echo "Submitting for notarization..."
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$MACOS_NOTARIZE_APPLE_ID" \
            --team-id "$MACOS_NOTARIZE_TEAM_ID" \
            --password "$MACOS_NOTARIZE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_NAME"
          echo "✅ Notarization complete"

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: YoLoIT-macos
          path: ${{ steps.package.outputs.dmg_name }}
          retention-days: 14

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: github.event.inputs.create_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          DMG_NAME: ${{ steps.package.outputs.dmg_name }}
          ARCH_LABEL: ${{ steps.package.outputs.arch_label }}
          SIGNED: ${{ steps.signing.outputs.signed }}
        run: |
          SIGN_NOTE=""
          if [ "$SIGNED" = "false" ]; then
            SIGN_NOTE=" (unsigned build)"
          fi

          printf 'macOS build %s run #${{ github.run_number }}%s\n\nArchitecture: **%s**\n\n## Installation\nDownload the DMG, open it and drag YoLoIT.app to Applications.\n' \
            "$RELEASE_TAG" "$SIGN_NOTE" "$ARCH_LABEL" > release-notes.md

          gh release delete "$RELEASE_TAG" --yes 2>/dev/null || true
          gh release create "$RELEASE_TAG" \
            --title "YoLoIT macOS $RELEASE_TAG" \
            --notes-file release-notes.md \
            --latest \
            "$DMG_NAME"

      # ── Cleanup ──────────────────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f certificate.p12
